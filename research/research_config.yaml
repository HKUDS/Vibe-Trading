# research/research_config.yaml
# 管線種子設定檔 — D5 決策：只放 seed inputs，階段間決策走 JSON handoff。
# 修改此檔可重新定向整條管線，不需改任何 .py 原始碼。

# ─── 研究幣種清單 ──────────────────────────────────────────────────────────────
# 管線對每個幣種跑一輪，產出檔名帶幣種前綴（btc_、eth_）互不覆蓋。
# 每個 symbol entry 需包含：
#   name      : 短名（小寫），用作檔名前綴與 run 目錄前綴
#   okx_swap  : OKX 永續合約代碼（REST / funding history 使用）
#   ccxt_bybit: ccxt 統一格式的 Bybit 永續合約代碼（OI history 使用）
symbols:
- name: btc
  okx_swap: "BTC-USDT-SWAP"
  ccxt_bybit: "BTC/USDT:USDT"

# ETH 已驗證為 negative result（見 memory project_eth_4yr_negative_result），暫關：
# - name: eth
#   okx_swap: "ETH-USDT-SWAP"
#   ccxt_bybit: "ETH/USDT:USDT"

# ─── 資料抓取參數 ──────────────────────────────────────────────────────────────
period: 1460         # 回溯天數（約 4 年）— funding 改 ccxt 多年源後可拉長；2022-05 起資料
interval: "1H"       # K 線週期（OKX bar 格式）
# Walk-forward train/OOS split: 在 oos_start 之前為 in-sample TRAIN 窗（stage4 只在此選參），
# 之後為 held-out OOS 窗（stage4 自動用 best params 回測驗證，寫入 manifest.walk_forward）。
# 留空 / 移除 = 不切分（legacy：全期選參）。資料 2022-06 起，此設 ≈ 2.5yr train / 1.4yr OOS。
oos_start: "2025-01-01"
data_source: okx     # 資金費率 & K 線來源；OI 固定來自 Bybit

# ─── 回測引擎 ──────────────────────────────────────────────────────────────────
engine: daily        # backtest.runner 引擎模式（daily / hourly）

# ─── 交易成本（OKX 掛單 / 吃單 / 滑點，單位：比率） ──────────────────────────
fees:
  maker_rate: 0.0002   # BTC 永續掛單手續費 0.02%
  taker_rate: 0.00055  # BTC 永續吃單手續費 0.055%
  slippage:   0.0005   # 預設滑點估計 0.05%

# ─── 因子分析 Horizons ──────────────────────────────────────────────────────────
# IC/IR 計算所用的前向報酬時窗（小時）
horizons_h: [8, 24, 72, 168]

# ─── Stage 0 探索快取 ────────────────────────────────────────────────────────
discovery_cache_days: 7    # swarm 重跑間隔天數（0 = 永不快取）

# ─── 技術指標池（evidence-driven factor discovery） ──────────────────────────
# 列出啟用的短名稱指標；indicators.py 依此清單計算特徵。
# 省略此區塊則使用下列預設 13 個指標。
# indicator_pool:
#   # momentum
#   - rsi_14
#   - macd_diff
#   - roc_10
#   - stoch_k
#   # trend
#   - ema_cross_9_21
#   - sma_cross_10_30
#   - adx_14
#   # volatility
#   - atr_14
#   - bb_width_20
#   - rolling_std_20
#   # volume
#   - obv
#   - mfi_14
#   - volume_zscore_20

# ─── Feature Store 路徑 ──────────────────────────────────────────────────────
# 計算好的指標特徵快取目錄（相對 repo root）。
# feature_store_path: "research/manifests"   # 預設值

# ─── Feature 覆蓋率門檻 ──────────────────────────────────────────────────────
# 新增一欄特徵時，非 NaN 比例必須達到此閾值才接受（0.0–1.0）。
# append_coverage_threshold: 0.5   # 預設 50%

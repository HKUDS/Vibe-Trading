# Pre-commit hooks for the entire project
# Install: pip install pre-commit && pre-commit install

repos:
  # Python linting & formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(agent|backend)/.*\.py$
      - id: ruff-format
        files: ^(agent|backend)/.*\.py$

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic, types-requests]
        files: ^backend/src/.*\.py$
        args: [--strict, --ignore-missing-imports]

  # Frontend linting & formatting
  - repo: local
    hooks:
      - id: eslint-frontend
        name: ESLint (frontend)
        entry: bash -c 'cd frontend && npx eslint --fix --max-warnings=0'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: prettier-frontend
        name: Prettier (frontend)
        entry: bash -c 'cd frontend && npx prettier --write --ignore-unknown'
        language: system
        files: ^frontend/.*\.(ts|tsx|css|json|md)$
        pass_filenames: true

  # Security checks
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
